<!DOCTYPE html>
<html>
<head>
  <title>QR Scanner</title>

  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #111;
      color: white;
    }

    #reader {
      width: 300px;
      margin: auto;
      margin-top: 20px;
    }

    #result {
      font-size: 24px;
      margin-top: 15px;
    }

    .box {
      margin: 10px auto;
      padding: 10px;
      border: 1px solid white;
      width: 250px;
    }

    button {
      margin-top: 10px;
      padding: 10px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h2>QR Scanner</h2>

<div id="reader"></div>

<button onclick="switchCamera()">🔁 Flip Camera</button>

<div id="result">Scanning...</div>

<div id="list"></div>

<script>

let people = {
  "101": { name: "Mom", status: "OUT" },
  "102": { name: "Dad", status: "OUT" },
  "103": { name: "Aaryan", status: "OUT" },
  "104": { name: "Shree", status: "OUT" }
};

let currentFacingMode = "environment";

let scanner = new Html5Qrcode("reader");

// start scanner
function startScanner() {
  scanner.start(
    { facingMode: currentFacingMode },
    {
      fps: 10,
      qrbox: 250
    },
    onScanSuccess
  );
}

// stop + switch camera
function switchCamera() {
  scanner.stop().then(() => {
    currentFacingMode =
      currentFacingMode === "environment"
        ? "user"
        : "environment";

    startScanner();
  });
}

// scan result
function onScanSuccess(decodedText) {

  let person = people[decodedText];

  if (!person) {
    document.getElementById("result").innerText = "ID NOT FOUND";
    return;
  }

  // toggle IN/OUT
  person.status = person.status === "IN" ? "OUT" : "IN";

  document.getElementById("result").innerText =
    person.name + " is now " + person.status;

  updateUI();
}

// update display
function updateUI() {
  let html = "";

  for (let id in people) {
    html += `
      <div class="box">
        <b>${people[id].name}</b><br>
        ${people[id].status}
      </div>
    `;
  }

  document.getElementById("list").innerHTML = html;
}

// start
startScanner();
updateUI();

</script>

</body>
</html>
