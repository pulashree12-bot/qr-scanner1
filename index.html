<!DOCTYPE html>
<html>
<head>
  <title>QR Scanner</title>

  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #111;
      color: white;
    }

    #reader {
      width: 300px;
      margin: auto;
      margin-top: 20px;
    }

    #result {
      font-size: 30px;
      margin-top: 20px;
    }
  </style>
</head>

<body>

<h2>House QR Scanner</h2>

<div id="reader"></div>
<div id="result">Scanning...</div>

<script>
const scanner = new Html5Qrcode("reader");

function onScanSuccess(decodedText) {
  scanner.pause();

  fetch("https://script.google.com/macros/s/AKfycbydcPjLBT2WwzF0KHlHe547lAzO1S4kPKZQYLfze1987MwrcXr6yNMS4Z-dTzdynMzA/exec?id=" + decodedText)
    .then(res => res.text())
    .then(data => {

      let parts = data.split("|");

      document.getElementById("result").innerText =
        parts[0] + " is now " + parts[1];

      setTimeout(() => {
        scanner.resume();
      }, 1000);

    });
}

// Start camera
scanner.start(
  { facingMode: "environment" },
  { fps: 10, qrbox: 250 },
  onScanSuccess
);
</script>

</body>
</html>
