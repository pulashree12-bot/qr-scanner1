 <!DOCTYPE html>
<html>
<head>
  <title>House QR Scanner</title>

  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #111;
      color: white;
      margin: 0;
    }

    h2 {
      margin-top: 20px;
    }

    #reader {
      width: 320px;
      margin: auto;
      margin-top: 20px;
    }

    #result {
      font-size: 32px;
      margin-top: 20px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h2>House QR Scanner</h2>

<div id="reader"></div>
<div id="result">Starting camera...</div>

<script>
const resultEl = document.getElementById("result");
const html5QrCode = new Html5Qrcode("reader");

let scanningLocked = false;

// ✅ When QR is scanned
function onScanSuccess(decodedText) {
  if (scanningLocked) return;
  scanningLocked = true;

  resultEl.innerText = "Processing...";

  fetch("https://script.google.com/macros/s/AKfycbz0OBv57xj-PbtFKVzgjakIyIKBlM4RM-JKlNre5n5tjrMgW2Mu2hICWDVWyQl_lMO0/exec?id=" + decodedText)
    .then(res => res.text())
    .then(data => {

      if (data === "NOT_FOUND") {
        resultEl.innerText = "❌ ID NOT FOUND";
      } else {
        let parts = data.split("|");

        // 🔥 FINAL FORMAT YOU WANTED
        resultEl.innerText = parts[0] + " — " + parts[1];
      }

      setTimeout(() => {
        resultEl.innerText = "Scanning...";
        scanningLocked = false;
      }, 1500);

    })
    .catch(() => {
      resultEl.innerText = "⚠️ Error connecting";
      scanningLocked = false;
    });
}

// ✅ Start camera (Safari-safe)
Html5Qrcode.getCameras()
  .then(devices => {
    if (!devices.length) {
      resultEl.innerText = "No camera found";
      return;
    }

    html5QrCode.start(
      devices[0].id,
      { fps: 10, qrbox: 250 },
      onScanSuccess
    );

    resultEl.innerText = "Scanning...";
  })
  .catch(() => {
    resultEl.innerText = "Camera permission error";
  });
</script>

</body>
</html>
