<!DOCTYPE html>
<html>
<head>
  <title>QR Scanner</title>

  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #111;
      color: white;
    }

    #reader {
      width: 300px;
      margin: auto;
      margin-top: 20px;
    }

    #result {
      font-size: 26px;
      margin-top: 20px;
    }
  </style>
</head>

<body>

<h2>QR Scanner</h2>

<div id="reader"></div>

<div id="result">Scanning...</div>

<script>

let people = {
  "101": { name: "Mom", status: "OUT" },
  "102": { name: "Dad", status: "OUT" },
  "103": { name: "Brother", status: "OUT" },
  "104": { name: "You", status: "OUT" }
};

function onScanSuccess(decodedText) {

  let person = people[decodedText];

  if (!person) {
    document.getElementById("result").innerText = "ID NOT FOUND";
    return;
  }

  // toggle IN / OUT
  person.status = person.status === "IN" ? "OUT" : "IN";

  document.getElementById("result").innerText =
    person.name + " is now " + person.status;
}

const scanner = new Html5Qrcode("reader");

scanner.start(
  { facingMode: "environment" },
  { fps: 10, qrbox: 250 },
  onScanSuccess
);

</script>

</body>
</html>
